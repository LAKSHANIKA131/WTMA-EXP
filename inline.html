<!DOCTYPE html>
<html>
<head>
    <title>Result Portal - Internal CSS</title>

    <style>
        body {
            background-color: #eef3fb;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #1e3c72;
            text-align: center;
        }

        p {
            color: #333;
            text-align: center;
            font-size: 18px;
        }

        button {
            background-color: #1e3c72;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            display: block;
            margin: 20px auto;
            cursor: pointer;
        }

        button:hover {
            background-color: #16305f;
        }
    </style>
</head>

<body>

    <h1>Online Result Publishing Portal</h1>

    <p>Check your academic performance securely.</p>

    <button>Login to View Results</button>

</body>
</html>
